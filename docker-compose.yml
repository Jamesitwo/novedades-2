version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: novedades-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: novedades_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-novedades_password}
      POSTGRES_DB: novedades
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U novedades_user -d novedades']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novedades-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://novedades_user:${DB_PASSWORD:-novedades_password}@postgres:5432/novedades?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '3001:3001'

volumes:
  pgdata:
