services:
  - type: web
    name: novedades-api
    env: node
    region: oregon
    buildCommand: npm install && npm run build && npm run db:push && npm run db:seed
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
