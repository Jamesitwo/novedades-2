version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: novedades-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: novedades
      POSTGRES_PASSWORD: novedades
      POSTGRES_DB: novedades
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U novedades -d novedades']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: novedades-api-dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://novedades:novedades@postgres:5432/novedades?schema=public
      JWT_SECRET: dev_secret_key_for_testing_only_change_in_production
      JWT_EXPIRES_IN: 8h
      PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    command: >
      sh -c "npm install && npx prisma generate --schema prisma/schema.prisma && npx prisma db push --schema prisma/schema.prisma && npm run db:seed && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: novedades-web-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_NAME: GestionNovedades
    command: >
      sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  pgdata_dev:
  backend_node_modules:
  frontend_node_modules:
